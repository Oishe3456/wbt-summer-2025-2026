<!DOCTYPE html>
<html lang="en">
<head>

    <body>
        
    <div class="heading">
     <h1>Registration</h1>
     </div>

     <div class="title">
     <h2>please complete all fields below</h2>
     </div>

     <div class="line">
     <hr>
     </div>
    
     <div class="name_label">
        <label>Full Name</label>
      <input type="text" placeholder="type name">
     </div>

     <div class="postal_label">
      <label>Postal Code</label>
      <input type="number" placeholder="type code">
     </div>

     <div class="dob_label">
      <label>Date of Birth</label>
      <input type="date" placeholder="mm/dd/yy">
     </div>

     <div class="email_label">
      <label>Email Address</label>
      <input type="email" placeholder="person@gmail.com">
     </div>

     <div class="Pass_label">
      <label>Password</label>
      <input type="password" placeholder="********">
     </div>
    
     <div class="Country_label">
        <label>Country</label>
        <select>
        <option>"select a country.."</option>
        <option>"Bangladesh"</option>
        <option>"India"</option>
        <option>"Japan"</option>
        <option>"USA"</option>
        </select>
     </div>

     <div class="submit button">
        <input type="Submit" value="Submit">
        <input type="reset" value="reset">
     </div>

    </body>
</head>
</html>
