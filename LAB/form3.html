<!DOCTYPE html>
<html lang="en">
<head>

    <body>
        
    <div class="heading">
     <h1>Create Your Account</h1>
     <div class="title">
     <h2>join us in a couple of steps</h2>
     </div>

     <div class="line">
     <hr>
     </div>
    
     <div class="name_label">
        <label>Full Name</label>
        <input type="text" placeholder="type name">
     </div>

     <div class="age_label">
        <label>Age</label>
        <input type="number" placeholder="23">
     </div>

     <div class="dob_label">
        <label>Date of Birth</label>
        <input type="date" placeholder="mm/dd/yy">
     </div>

     <div class="email_label">
        <label>Email Address</label>
        <input type="email" placeholder="person@gmail.com">
     </div>

     <div class="Pass_label">
        <label for="Password" class="form_label"></label>
        <input type="password" placeholder="********">
     </div>
    
     <div class="Country_label">
        <label>Country</label>
        <select>
        <option>"select a country.."</option>
        <option>"Bangladesh"</option>
        <option>"India"</option>
        <option>"Japan"</option>
        <option>"USA"</option>
        </select>
     </div>

   <div class="contact">
            <label>Preferred Contact</label>
 
            <input type="radio" name="contact" value="email">
            <label>Email</label>
 
            <input type="radio" name="contact" value="phone">
            <label>Phone</label>
 
            <input type="radio" name="contact" value="sms">
            <label>SMS</label>
   </div>


     <div class="submit button">
        <input type="Submit" value="Submit">
        <input type="reset" value="reset">
     </div>

    </body>
</head>
</html>
